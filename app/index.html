<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>广义相对论课程知识图谱</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="graph-panel" aria-label="知识图谱">
        <header class="topbar">
          <h1>广义相对论课程知识图谱</h1>
          <div class="search-box">
            <label for="searchInput">搜索</label>
            <input id="searchInput" type="search" placeholder="输入中文名、英文名或 id">
          </div>
        </header>
        <div id="network" class="network"></div>
        <div id="status" class="status">正在读取 graph.json...</div>
      </section>
      <aside class="detail-panel" aria-label="知识点详情">
        <div class="detail-heading">
          <p class="eyebrow">当前知识点</p>
          <h2 id="detailTitle">请选择一个节点</h2>
          <p id="detailSubtitle">点击图中的知识点查看学习目标和 AI 学习任务。</p>
        </div>
        <dl id="detailList" class="detail-list"></dl>
        <section class="qa-panel" aria-label="课程问答">
          <div class="qa-heading">
            <p class="eyebrow">课程问答</p>
            <h2>问知识图谱</h2>
            <p>输入一个课程问题，系统会调用 Kimi 并结合当前知识图谱生成回答。</p>
          </div>
          <div class="qa-examples" aria-label="快捷问题">
            <button type="button" data-question="什么是事件视界？">事件视界是什么</button>
            <button type="button" data-question="测地线的前置知识是什么？">测地线前置知识</button>
            <button type="button" data-question="度规张量有什么常见误区？">度规常见误区</button>
          </div>
          <label class="qa-label" for="qaInput">你的问题</label>
          <textarea id="qaInput" rows="4" placeholder="例如：我不懂测地线，需要先学什么？"></textarea>
          <button id="askButton" class="qa-submit" type="button">询问 Kimi</button>
          <div id="qaAnswer" class="qa-answer" aria-live="polite">
            可以问“是什么”“需要先学什么”“有什么常见误区”“和哪些知识点有关”。外接 LLM 需要通过本地后端打开页面。
          </div>
        </section>
      </aside>
    </main>
    <script src="graph-data.js?v=1"></script>
    <script src="app.js?v=8"></script>
  </body>
</html>
